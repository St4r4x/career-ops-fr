name: diggo

services:
  api:
    build: .
    command: ["dashboard"]
    volumes:
      - ./reports:/app/reports
      - ./output:/app/output
      - ./config:/app/config:ro
      - ./dashboard/templates:/app/dashboard/templates:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_PUBLIC_URL=http://localhost:54321
    restart: unless-stopped

  web:
    build: ./frontend
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  pipeline:
    build: .
    command: ["pipeline"]
    volumes:
      - ./reports:/app/reports
      - ./output:/app/output
      - ./config:/app/config:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
    profiles:
      - manual
