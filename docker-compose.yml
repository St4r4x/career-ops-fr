services:
  dashboard:
    build: .
    command: ["dashboard"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./reports:/app/reports
      - ./output:/app/output
      - ./config:/app/config:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
    restart: unless-stopped

  pipeline:
    build: .
    command: ["pipeline"]
    volumes:
      - ./reports:/app/reports
      - ./output:/app/output
      - ./config:/app/config:ro
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
    profiles:
      - manual
